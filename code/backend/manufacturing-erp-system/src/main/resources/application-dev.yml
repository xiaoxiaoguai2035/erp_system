server:
  port: 8080

spring:
  application:
    name: manufacturing-erp-system
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/manufacturing_erp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  is-read-header: true
  is-read-cookie: false
  timeout: 2592000
  active-timeout: 86400
  is-concurrent: true
  is-share: true

knife4j:
  enable: true

erp:
  ai:
    enabled: ${ERP_AI_ENABLED:false}
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model-name: ${DASHSCOPE_MODEL_NAME:qwen-plus}
